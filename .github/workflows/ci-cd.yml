name: Insurance App CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
        
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
        
      - name: Run tests
        run: mvn clean test
      
      - name: Build application
        run: mvn clean package -DskipTests
      
      - name: Upload WAR file
        uses: actions/upload-artifact@v4
        with:
          name: insurance-app-war
          path: target/*.war
          retention-days: 1

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Trigger Jenkins Deployment
        run: |
          curl -X POST "[localhost](http://localhost:8080/generic-webhook-trigger/invoke?token=insurance-deploy-token)" \
               -H "Content-Type: application/json" \
               -d '{"ref": "${{ github.ref }}", "repository": "${{ github.repository }}"}'
          echo "Jenkins deployment triggered successfully"
      
      - name: Wait for deployment
        run: sleep 30
      
      - name: Validate deployment
        run: |
          echo "Checking application health..."
          for i in {1..5}; do
            if curl -f "[localhost](http://localhost:8080/insurance/health)"; then
              echo "✅ Application deployed successfully!"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          echo "❌ Deployment validation failed"
          exit 1
